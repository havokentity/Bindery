name: Validate package

on:
  push:
  pull_request:

# ---------------------------------------------------------------------------
# Lightweight package validation — runs with NO Unity license (Bindery is a
# pure Editor package; compiling it needs the Unity compiler, which needs a
# licensed editor, so CI deliberately does NOT compile/run the EditMode tests.
# Run those locally via Window ▸ General ▸ Test Runner). What CI checks:
#   1. package.json is valid JSON with the required UPM fields, and its
#      version is recorded in CHANGELOG.md.
#   2. Every .asmdef is valid JSON.
#   3. Every declared sample path exists.
#   4. Every tracked source file has a sibling .meta.
#   5. Every .meta guid is unique across the repo.
# ---------------------------------------------------------------------------
jobs:
  validate-package:
    name: Validate package structure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: package.json + CHANGELOG + samples
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path

          fail = []

          try:
              pkg = json.loads(Path("package.json").read_text())
          except Exception as e:
              print(f"ERROR: package.json is not valid JSON: {e}", file=sys.stderr)
              sys.exit(1)

          for k in ("name", "version", "unity"):
              if k not in pkg:
                  fail.append(f"package.json missing required field: {k}")

          version = pkg.get("version", "")

          # The current version should be documented in the changelog.
          changelog = Path("CHANGELOG.md")
          if changelog.exists():
              if version and f"[{version}]" not in changelog.read_text():
                  fail.append(f"CHANGELOG.md has no entry for version [{version}]")
          else:
              fail.append("CHANGELOG.md is missing")

          # Every declared sample path must exist.
          for s in pkg.get("samples", []):
              p = s.get("path", "")
              if p and not Path(p).is_dir():
                  fail.append(f"sample path does not exist: {p}")

          if fail:
              for f in fail:
                  print("ERROR:", f, file=sys.stderr)
              sys.exit(1)

          print(f"OK: package.json name={pkg['name']} version={version} unity={pkg['unity']}; "
                f"CHANGELOG + {len(pkg.get('samples', []))} sample path(s) verified.")
          EOF

      - name: Every .asmdef is valid JSON
        run: |
          python3 - <<'EOF'
          import json, sys
          from pathlib import Path
          bad = []
          n = 0
          for f in sorted(Path(".").rglob("*.asmdef")):
              if "Samples~" in f.parts:
                  continue
              n += 1
              try:
                  json.loads(f.read_text())
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              for b in bad:
                  print("ERROR: invalid asmdef:", b, file=sys.stderr)
              sys.exit(1)
          print(f"OK: {n} .asmdef file(s) are valid JSON.")
          EOF

      - name: Every source file has a sibling .meta
        run: |
          missing=0
          while IFS= read -r -d '' file; do
            [[ "$file" == *.meta ]] && continue
            if [[ ! -f "${file}.meta" ]]; then
              echo "MISSING .meta: ${file}.meta"
              missing=$((missing + 1))
            fi
          done < <(find Runtime Editor -type f \( -name "*.cs" -o -name "*.asmdef" -o -name "package.json" \) -print0)
          if [[ $missing -gt 0 ]]; then
            echo "ERROR: $missing file(s) are missing a .meta sibling." >&2
            exit 1
          fi
          echo "OK: all source files have .meta files."

      - name: Every .meta guid is unique
        run: |
          python3 - <<'EOF'
          import re, sys
          from pathlib import Path

          guid_re = re.compile(r'^guid:\s*([0-9a-f]{32})', re.MULTILINE)
          seen, dupes = {}, []

          for meta in sorted(Path(".").rglob("*.meta")):
              if "Samples~" in meta.parts:
                  continue
              m = guid_re.search(meta.read_text(errors="replace"))
              if not m:
                  continue
              guid = m.group(1)
              if guid in seen:
                  dupes.append((guid, seen[guid], str(meta)))
              else:
                  seen[guid] = str(meta)

          if dupes:
              for guid, first, second in dupes:
                  print(f"DUPLICATE guid {guid}:\n  {first}\n  {second}", file=sys.stderr)
              print(f"\nERROR: {len(dupes)} duplicate guid(s) found.", file=sys.stderr)
              sys.exit(1)

          print(f"OK: {len(seen)} unique guid(s) — no duplicates.")
          EOF
